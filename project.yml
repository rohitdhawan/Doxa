name: NewDocGenieAI
options:
  bundleIdPrefix: com.newdocgenieai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: "YES"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleDisplayName: "Doxa"
targets:
  NewDocGenieAI:
    type: application
    platform: iOS
    sources:
      - path: NewDocGenieAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newdocgenieai.app
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "Doxa needs access to your documents to import and manage files."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Doxa can import images from your photo library."
        INFOPLIST_KEY_NSCameraUsageDescription: "Doxa uses the camera to scan documents."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Doxa uses the microphone for voice input in chat."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Doxa uses speech recognition to convert your voice into text in chat."
    info:
      path: NewDocGenieAI/App/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        CFBundleDisplayName: "Doxa"
        LSSupportsOpeningDocumentsInPlace: true
        NSBonjourServices:
          - "_docgenie-xfer._tcp"
        NSCameraUsageDescription: "Doxa uses the camera to scan documents."
        NSLocalNetworkUsageDescription: "Doxa uses your local network to find nearby devices and transfer files securely."
        NSMicrophoneUsageDescription: "Doxa uses the microphone for voice input in chat."
        NSDocumentsFolderUsageDescription: "Doxa needs access to your documents to import and manage files."
        NSPhotoLibraryUsageDescription: "Doxa can import images from your photo library."
        NSSpeechRecognitionUsageDescription: "Doxa uses speech recognition to convert your voice into text in chat."
        UISupportsDocumentBrowser: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Documents"
            LSHandlerRank: "Alternate"
            LSItemContentTypes:
              - "com.adobe.pdf"
              - "org.openxmlformats.wordprocessingml.document"
              - "com.microsoft.word.doc"
              - "org.openxmlformats.spreadsheetml.sheet"
              - "com.microsoft.excel.xls"
              - "org.openxmlformats.presentationml.presentation"
              - "com.microsoft.powerpoint.ppt"
              - "public.plain-text"
              - "public.image"

schemes:
  NewDocGenieAI:
    build:
      targets:
        NewDocGenieAI: all
    run:
      config: Debug
      storeKitConfiguration: Configurations/Doxa.storekit
